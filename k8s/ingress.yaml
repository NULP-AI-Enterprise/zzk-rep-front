apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zzk-front
  namespace: zzk-front
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: zzk.thesis-i.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zzk-front
                port:
                  number: 3000
