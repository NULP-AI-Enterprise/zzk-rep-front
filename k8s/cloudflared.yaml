---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-token
  namespace: zzk-front
type: Opaque
stringData:
  # Replace with your Cloudflare Tunnel token:
  # cloudflared tunnel token <tunnel-name>
  token: "REPLACE_WITH_CLOUDFLARE_TUNNEL_TOKEN"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: zzk-front
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
